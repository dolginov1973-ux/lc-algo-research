name: hl-watch

# Forward copy-signal capture. Polls the vetted Hyperliquid traders in data-hl/watchlist.json
# and commits any position-change signals + the latest snapshot back to the repo, building an
# on-chain-verifiable paper record of the copy feed. GitHub cron is best-effort (can lag) — fine
# here because these are swing/position traders holding hours-to-days, not scalpers. For timely
# LIVE execution we'll move this to a dedicated always-on host (Infra B).

on:
  workflow_dispatch:
  schedule:
    # Hourly. GitHub throttles/skips sub-hourly crons (a */15 schedule barely fired here), and
    # hourly is plenty for swing/position traders that hold for hours. TIMELY live mirroring will
    # run on a dedicated always-on host (Infra B), not GitHub cron.
    - cron: '7 * * * *' # :07 each hour (off the top-of-hour rush = more reliable start)

permissions:
  contents: write

concurrency:
  group: hl-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Watch vetted traders (signal capture)
        run: node src/hyperliquid/watch-all.mjs
      - name: Paper executor (mirror + mark-to-market)
        run: node src/hyperliquid/paper-executor.mjs
      - name: Commit snapshots + signals + paper state
        run: |
          git config user.name "lc-seo"
          git config user.email "noreply@anthropic.com"
          # Force-add the WHOLE data-hl dir (snap/signals/paper-* are gitignored). Staging the dir
          # avoids the fatal "pathspec did not match" when an optional glob (e.g. signals-*.jsonl
          # before any signal fires) has no matches — which previously aborted the entire add and
          # silently dropped every paper-equity point.
          git add -f data-hl/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "hl-watch: signals + paper equity [skip ci]"
            git pull --rebase --autostash origin master || true
            git push origin HEAD:master || true
          fi
