name: backtest

# Runs from GitHub's datacenter IPs, which CAN reach Binance/Bitunix klines (the operator's
# RU ISP cannot). Fetches 90d OHLCV, runs the no-look-ahead engine smoke test, then ranks all
# strategies and commits the data + report so the run is reproducible.

on:
  workflow_dispatch:
    inputs:
      interval:
        description: 'Candle interval'
        default: '1h'
        type: string
      symbols:
        description: 'Space-separated symbols (blank = default basket)'
        default: ''
        type: string
      days:
        description: 'Lookback days'
        default: '90'
        type: string
  schedule:
    - cron: '0 6 * * 1' # weekly re-rank, Monday 06:00 UTC

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Engine smoke test (no-look-ahead)
        run: node test/engine-smoke.mjs
      - name: Fetch klines
        env:
          BACKTEST_DAYS: ${{ inputs.days || '90' }}
        run: node src/data/fetch-klines.mjs ${{ inputs.interval || '1h' }} ${{ inputs.symbols }}
      - name: Run backtest
        run: node src/run-backtest.mjs
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: reports/
      - name: Commit data + report
        run: |
          git config user.name "lc-seo"
          git config user.email "noreply@anthropic.com"
          git add data/ reports/latest.json
          git commit -m "backtest: refresh data + ranking [skip ci]" || echo "nothing to commit"
          git pull --rebase origin master || true
          git push origin HEAD:master || true

